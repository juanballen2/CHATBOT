<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extractor Inteligente - ICC</title>
    <link rel="icon" href="https://raw.githubusercontent.com/juanballen2/CHATBOT/main/images/iconboticc_Mesa%20de%20trabajo%201.svg" type="image/svg+xml">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E9511D; /* Tono de marca oficial */
            --bg-main: #F5F7F9;
            --panel: #FFFFFF;
            --border: #E0E6ED;
            --text: #464445;
            --text-muted: #8892A0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; }
        
        .container { max-width: 800px; width: 100%; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header img { width: 180px; margin-bottom: 15px; }
        .header h1 { font-size: 1.8rem; font-weight: 700; color: var(--text); }
        .header p { color: var(--text-muted); font-weight: 500; }

        .card { background: var(--panel); border-radius: 12px; padding: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); border: 1px solid var(--border); margin-bottom: 20px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .tab-btn { background: transparent; border: none; font-size: 1rem; font-weight: 600; color: var(--text-muted); cursor: pointer; padding: 10px 20px; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { color: var(--primary); background: rgba(233, 81, 29, 0.1); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .input-box { width: 100%; padding: 15px; border: 2px dashed var(--border); border-radius: 8px; font-size: 1rem; color: var(--text); outline: none; transition: 0.2s; resize: vertical; min-height: 120px; }
        .input-box:focus { border-color: var(--primary); }

        .paste-area { width: 100%; height: 180px; border: 2px dashed var(--border); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); background: #FAFAFA; cursor: pointer; transition: 0.2s; position: relative; overflow: hidden; }
        .paste-area:hover, .paste-area.focus { border-color: var(--primary); background: rgba(233, 81, 29, 0.05); }
        .paste-area img { position: absolute; width: 100%; height: 100%; object-fit: contain; display: none; background: #000; }

        .btn-primary { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(233, 81, 29, 0.3); }
        .btn-primary:disabled { background: #CCC; cursor: not-allowed; transform: none; box-shadow: none; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full { grid-column: span 2; }
        .form-label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; color: var(--text); outline: none; background: var(--bg-main); font-weight: 500; }
        .form-input:focus { border-color: var(--primary); background: var(--panel); }

        .nav-back { position: absolute; top: 20px; left: 20px; color: var(--text-muted); text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .nav-back:hover { color: var(--primary); }
    </style>
</head>
<body>

    <a href="/?tab=leads" class="nav-back"><i class="fas fa-arrow-left"></i> Volver al CRM</a>

    <div class="container">
        <div class="header">
            <img src="https://raw.githubusercontent.com/juanballen2/CHATBOT/main/images/iconboticc_Mesa%20de%20trabajo%201.svg" alt="ICC Logo">
            <h1>Extractor de Candidatos Inteligente</h1>
            <p>Extrae y clasifica leads con IA desde texto o capturas de pantalla.</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('text')"><i class="fas fa-comment-alt"></i> Pegar Texto</button>
                <button class="tab-btn" onclick="switchTab('image')"><i class="fas fa-camera"></i> Pegar Captura (Recomendado)</button>
            </div>

            <div id="tab-text" class="tab-content active">
                <textarea id="raw-text" class="input-box" placeholder="Selecciona el texto en WhatsApp, cópialo (Ctrl+C) y pégalo aquí..."></textarea>
                <button class="btn-primary" id="btn-process-text" onclick="processData('text')"><i class="fas fa-brain"></i> Procesar Texto con IA</button>
            </div>

            <div id="tab-image" class="tab-content">
                <div class="paste-area" id="paste-area" tabindex="0">
                    <i class="fas fa-clipboard" style="font-size: 3rem; margin-bottom: 10px;"></i>
                    <p>Haz clic aquí y presiona <b>Ctrl+V</b> para pegar tu captura de pantalla</p>
                    <img id="preview-image" src="" alt="Vista previa">
                </div>
                <button class="btn-primary" id="btn-process-image" onclick="processData('image')" disabled><i class="fas fa-magic"></i> Procesar Captura con IA</button>
            </div>
        </div>

        <div class="card" id="results-card" style="display: none;">
            <h2 style="font-size: 1.2rem; margin-bottom: 5px; color: var(--primary); border-bottom: 2px solid var(--bg-main); padding-bottom: 10px;">
                <i class="fas fa-check-circle"></i> Revisión de Datos Extraídos
            </h2>
            <div class="form-grid">
                <div class="form-group"><label class="form-label">Nombre</label><input type="text" id="sf-nombre" class="form-input"></div>
                <div class="form-group"><label class="form-label">Apellido</label><input type="text" id="sf-apellido" class="form-input"></div>
                <div class="form-group"><label class="form-label">Teléfono (Detectado)</label><input type="text" id="sf-telefono" class="form-input"></div>
                <div class="form-group"><label class="form-label">Correo Electrónico</label><input type="email" id="sf-correo" class="form-input"></div>
                <div class="form-group full"><label class="form-label">Detalle del Producto</label><input type="text" id="sf-detalle" class="form-input"></div>
                <div class="form-group"><label class="form-label">Categoría de Producto</label><input type="text" id="sf-categoria" class="form-input"></div>
                <div class="form-group"><label class="form-label">Departamento Homologado</label><input type="text" id="sf-ubicacion" class="form-input"></div>
            </div>
            <button class="btn-primary" id="btn-sync-sf" style="margin-top: 25px;" onclick="enviarSalesforce()"><i class="fas fa-cloud-upload-alt"></i> Confirmar y Cargar a Salesforce</button>
        </div>
    </div>

    <script>
        let currentImageBlob = null;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // LÓGICA DE CAPTURA DEL PORTAPAPELES (Ctrl+V)
        const pasteArea = document.getElementById('paste-area');
        pasteArea.addEventListener('paste', (e) => {
            e.preventDefault();
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let index in items) {
                const item = items[index];
                if (item.kind === 'file') {
                    const blob = item.getAsFile();
                    currentImageBlob = blob;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = document.getElementById('preview-image');
                        img.src = event.target.result;
                        img.style.display = 'block';
                        document.getElementById('btn-process-image').disabled = false;
                    };
                    reader.readAsDataURL(blob);
                }
            }
        });

        async function processData(type) {
            const btn = document.getElementById(`btn-process-${type}`);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analizando con IA...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('type', type);

            if (type === 'text') {
                const text = document.getElementById('raw-text').value;
                if (!text) { alert("Pega algún texto primero."); btn.innerHTML = originalText; btn.disabled = false; return; }
                formData.append('data', text);
            } else {
                if (!currentImageBlob) { alert("Pega una imagen primero."); btn.innerHTML = originalText; btn.disabled = false; return; }
                formData.append('image', currentImageBlob, 'captura.png');
            }

            try {
                const res = await fetch('/api/extractor/process', { method: 'POST', body: formData });
                const json = await res.json();

                if (json.success && json.data) {
                    document.getElementById('results-card').style.display = 'block';
                    document.getElementById('sf-nombre').value = json.data.nombre || '';
                    document.getElementById('sf-apellido').value = json.data.apellido || '';
                    document.getElementById('sf-telefono').value = json.data.telefono || '';
                    document.getElementById('sf-correo').value = json.data.correo || '';
                    document.getElementById('sf-detalle').value = json.data.producto_detalle || '';
                    document.getElementById('sf-categoria').value = json.data.categoria_producto || '';
                    document.getElementById('sf-ubicacion').value = json.data.ubicacion || '';
                    
                    document.getElementById('results-card').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("Error en el análisis: " + json.message);
                }
            } catch (error) {
                alert("Error de conexión con el servidor.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function enviarSalesforce() {
            const btn = document.getElementById('btn-sync-sf');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Subiendo a Salesforce...';
            btn.disabled = true;

            const payload = {
                nombre: document.getElementById('sf-nombre').value,
                apellido: document.getElementById('sf-apellido').value,
                telefono: document.getElementById('sf-telefono').value,
                correo: document.getElementById('sf-correo').value,
                producto_detalle: document.getElementById('sf-detalle').value,
                categoria_producto: document.getElementById('sf-categoria').value,
                ubicacion: document.getElementById('sf-ubicacion').value
            };

            try {
                const res = await fetch('/api/extractor/salesforce', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (result.success) {
                    alert("🎉 ¡Lead creado exitosamente en Salesforce!");
                    document.getElementById('results-card').style.display = 'none';
                    document.getElementById('raw-text').value = '';
                    document.getElementById('preview-image').style.display = 'none';
                    currentImageBlob = null;
                    document.getElementById('btn-process-image').disabled = true;
                } else {
                    alert("⚠️ Error en Salesforce: " + result.message);
                }
            } catch (error) {
                alert("Fallo de red al enviar a Salesforce.");
            } finally {
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Confirmar y Cargar a Salesforce';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
